name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release create "$TAG" \
          --title "$TAG" \
          --notes-file apps/core/game/updateLog.md \
          --draft

  build-packages:
    name: Build Packages
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core and full packages
        shell: bash
        run: |
          mkdir -p release
          pnpm build

          cd apps/core/dist
          7z a ../../../release/noname.core.zip *

          cd ../../../dist
          7z a ../release/noname.full.zip *

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release upload "$TAG" \
          release/noname.core.zip \
          release/noname.full.zip \
          --clobber

  build-installer:
    name: Build Installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare version
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Build Windows installer
        shell: bash
        run: |
          mkdir -p release
          pnpm build

          pnpm -F @noname/electron build:win
          EXE="$(find output -maxdepth 1 -name '*.exe' | head -n 1)"
          cp "$EXE" "release/noname.Setup.${VER}.exe"

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release upload "$TAG" \
          "release/noname.Setup.${VER}.exe" \
          --clobber

  release:
    name: Release Version
    runs-on: ubuntu-latest
    needs:
      - build-packages
      - build-installer
    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release edit "$TAG" \
          --draft=false \
          --discussion-category "Announcements"

  cleanup-release:
    name: Clean Draft When Failure
    if: ${{ failure() }}
    needs:
      - create-release
      - build-packages
      - build-installer
      - release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete draft release on failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$GITHUB_REF_NAME" --yes --cleanup-tag=false
